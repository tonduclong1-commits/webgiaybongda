<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg_grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311042"/>
    </linearGradient>
    <linearGradient id="glow_grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur_eff">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg_grad2)"/>
  
  <!-- Abstract Speed Lines -->
  <path d="M -100 250 L 1300 250" stroke="url(#glow_grad2)" stroke-width="150" opacity="0.12" />
  <path d="M 0 220 Q 300 150, 600 280 T 1200 220" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.25"/>
  <path d="M 100 280 Q 400 350, 800 200 T 1100 280" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.15"/>
  
  <!-- Tech Grids -->
  <line x1="50" y1="0" x2="50" y2="500" stroke="#06b6d4" stroke-width="0.5" opacity="0.1" stroke-dasharray="5 5"/>
  <line x1="1150" y1="0" x2="1150" y2="500" stroke="#06b6d4" stroke-width="0.5" opacity="0.1" stroke-dasharray="5 5"/>

  <!-- Left Content: Bold Sporty Typography -->
  <g transform="translate(100, 110)">
    <!-- Logo Badge -->
    <path d="M 10 30 L 25 15 L 45 45 L 30 45 Z M 25 30 L 40 15 L 60 45 L 45 45 Z M 40 30 L 55 15 L 75 45 L 60 45 Z" fill="#06b6d4" opacity="0.95" />
    
    <!-- Titles -->
    <text x="0" y="90" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="70" fill="#ffffff" letter-spacing="1">ADIDAS</text>
    <text x="0" y="165" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="80" fill="#06b6d4" letter-spacing="1">F50 LEAGUE</text>
    <text x="0" y="215" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="bold" font-size="20" fill="#e2e8f0" letter-spacing="3">UNLEASH REAL SPEED.</text>
    
    <!-- Features -->
    <g transform="translate(0, 260)" font-family="Segoe UI, Roboto, sans-serif" font-size="14" font-weight="bold" fill="#cbd5e1">
      <circle cx="10" cy="-5" r="5" fill="#06b6d4"/>
      <text x="25" y="0">ĐỆM ĐẾ GIẢM CHẤN</text>
      <circle cx="230" cy="-5" r="5" fill="#06b6d4"/>
      <text x="245" y="0">DA MỀM CẢM GIÁC CỰC TỐT</text>
    </g>
  </g>

  <!-- Right Content: Shoe Silhouette Showcase -->
  <g transform="translate(710, 30)">
    <!-- Back light glow -->
    <circle cx="200" cy="220" r="170" fill="#06b6d4" opacity="0.2" filter="url(#blur_eff)"/>
    <circle cx="150" cy="200" r="110" fill="#ec4899" opacity="0.15" filter="url(#blur_eff)"/>
    
    <!-- Sole & Studs -->
    <path d="M 40 335 L 360 335 L 340 345 L 60 345 Z" fill="#0f172a" />
    <circle cx="80" cy="348" r="4" fill="#06b6d4" />
    <circle cx="120" cy="348" r="4" fill="#06b6d4" />
    <circle cx="160" cy="348" r="4" fill="#06b6d4" />
    <circle cx="240" cy="348" r="4" fill="#ec4899" />
    <circle cx="280" cy="348" r="4" fill="#ec4899" />
    <circle cx="320" cy="348" r="4" fill="#ec4899" />

    <!-- Shoe Upper Body -->
    <path d="M 45 335 C 40 270, 90 240, 130 250 C 180 200, 230 150, 300 160 C 335 165, 345 190, 360 220 C 385 240, 410 290, 400 335 Z" fill="#06b6d4" stroke="#1e293b" stroke-width="2"/>
    <path d="M 45 335 C 40 270, 90 240, 130 250 C 180 200, 230 150, 300 160 Z" fill="#0f172a" opacity="0.12"/>
    
    <!-- Dynamic overlay lines / stripes -->
    <path d="M 120 290 C 200 270, 260 210, 330 230 C 290 250, 200 320, 110 305 Z" fill="none" stroke="#ec4899" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <path d="M 130 298 C 190 285, 240 235, 310 250 C 285 265, 205 315, 122 305 Z" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Sock Collar -->
    <path d="M 230 155 C 240 100, 310 100, 320 155" fill="none" stroke="#ec4899" stroke-width="12" stroke-linecap="round"/>
    <path d="M 233 155 C 243 105, 307 105, 317 155" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Laces -->
    <path d="M 200 180 L 250 220" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round" opacity="0.7" />
    <path d="M 215 170 L 265 210" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round" opacity="0.7" />
  </g>
</svg>