<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#111827"/>
            <stop offset="100%" stop-color="#1f2937"/>
        </linearGradient>
        <linearGradient id="shoeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f8fafc"/>
            <stop offset="100%" stop-color="#cbd5e1"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg)"/>
    <circle cx="200" cy="150" r="110" fill="none" stroke="#374151" stroke-dasharray="5 5" stroke-width="1.5"/>
    <path d="M 60,240 L 340,240" stroke="#374151" stroke-width="2"/>
    
    <!-- Shoe silhouette -->
    <path d="M 80,180 C 110,130 160,105 240,105 C 290,105 325,125 335,155 C 345,185 320,215 260,220 C 180,225 120,215 80,180 Z" fill="url(#shoeGrad)" opacity="0.95"/>
    
    <!-- Sockliner / Collar -->
    <path d="M 140,122 C 130,95 155,75 180,75 C 195,75 195,100 185,115" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Sole studs -->
    <path d="M 120,220 L 125,230 L 135,230 L 130,220 Z" fill="#2563eb"/>
    <path d="M 170,222 L 175,232 L 185,232 L 180,222 Z" fill="#2563eb"/>
    <path d="M 220,222 L 225,232 L 235,232 L 230,222 Z" fill="#2563eb"/>
    <path d="M 270,218 L 273,228 L 283,228 L 280,218 Z" fill="#2563eb"/>
    
    <!-- Kelme Logo (Paw print / K-shape) -->
    <!-- Represented by a stylish blue 'K' or paw-like path -->
    <path d="M 190,135 L 205,135 L 225,160 L 245,135 L 260,135 L 235,170 L 260,205 L 245,205 L 225,180 L 205,205 L 190,205 Z" fill="#2563eb" opacity="0.8"/>
    
    <text x="50%" y="275" font-family="'Inter', sans-serif" font-weight="800" font-size="14" fill="#f8fafc" letter-spacing="1" text-anchor="middle">KELME TURF</text>
</svg>
