<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a"/>
            <stop offset="100%" stop-color="#1e293b"/>
        </linearGradient>
        <linearGradient id="shoeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#cbd5e1"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg)"/>
    <circle cx="200" cy="150" r="110" fill="none" stroke="#334155" stroke-dasharray="5 5" stroke-width="1.5"/>
    <path d="M 60,240 L 340,240" stroke="#334155" stroke-width="2"/>
    
    <!-- Shoe silhouette -->
    <path d="M 80,180 C 110,130 160,105 240,105 C 290,105 325,125 335,155 C 345,185 320,215 260,220 C 180,225 120,215 80,180 Z" fill="url(#shoeGrad)" opacity="0.95"/>
    
    <!-- Sockliner / Collar -->
    <path d="M 140,122 C 130,95 155,75 180,75 C 195,75 195,100 185,115" fill="none" stroke="#d4af37" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Sole studs -->
    <path d="M 120,220 L 125,235 L 135,235 L 130,220 Z" fill="#d4af37"/>
    <path d="M 170,222 L 175,237 L 185,237 L 180,222 Z" fill="#d4af37"/>
    <path d="M 220,222 L 225,237 L 235,237 L 230,222 Z" fill="#d4af37"/>
    <path d="M 270,218 L 273,233 L 283,233 L 280,218 Z" fill="#d4af37"/>
    
    <!-- Mizuno Runbird Logo Shape -->
    <path d="M 170,165 C 200,165 240,140 260,125 C 230,145 200,185 170,185 C 190,180 220,180 250,155 C 210,175 180,170 170,165 Z" fill="#d4af37"/>
    
    <text x="50%" y="275" font-family="'Inter', sans-serif" font-weight="800" font-size="14" fill="#f8fafc" letter-spacing="1" text-anchor="middle">MIZUNO MORELIA NEO IV</text>
</svg>
