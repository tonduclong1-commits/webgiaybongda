  <!-- Number badge -->
  <rect x="222" y="8" width="50" height="22" rx="4" fill="#3b82f6" opacity="0.9"/>
  <text x="247" y="23" font-family="Arial, sans-serif" font-size="10" font-weight="900"
        fill="#ffffff" text-anchor="middle">#35</text>
